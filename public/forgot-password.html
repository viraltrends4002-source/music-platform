<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Music Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <!-- Logo/Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🎵 Music Platform</h1>
            <p class="text-gray-200">Reset Your Password</p>
        </div>

        <!-- Main Card -->
        <div class="glass rounded-lg p-8 shadow-2xl">
            <!-- Step 1: Request OTP -->
            <div id="step1" class="space-y-4">
                <h2 class="text-xl font-bold text-white mb-4">Step 1: Enter Your Email</h2>
                <form id="emailForm" class="space-y-4">
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="emailInput" placeholder="your@email.com" class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:border-white" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">
                        Send OTP
                    </button>
                    <div id="step1Message" class="text-center text-sm text-red-200 hidden"></div>
                </form>
            </div>

            <!-- Step 2: Verify OTP -->
            <div id="step2" class="space-y-4 hidden">
                <h2 class="text-xl font-bold text-white mb-4">Step 2: Enter OTP</h2>
                <p class="text-gray-300 text-sm mb-4">We've sent a 6-digit code to your email</p>
                <form id="otpForm" class="space-y-4">
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">OTP Code</label>
                        <input type="text" id="otpInput" placeholder="000000" maxlength="6" class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:border-white text-center text-2xl tracking-widest" pattern="[0-9]{6}" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">
                        Verify OTP
                    </button>
                    <button type="button" onclick="backToStep1()" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition duration-200">
                        Back
                    </button>
                    <div id="step2Message" class="text-center text-sm text-red-200 hidden"></div>
                </form>
            </div>

            <!-- Step 3: Reset Password -->
            <div id="step3" class="space-y-4 hidden">
                <h2 class="text-xl font-bold text-white mb-4">Step 3: Create New Password</h2>
                <form id="resetForm" class="space-y-4">
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">New Password</label>
                        <input type="password" id="newPassword" placeholder="Min 6 characters" class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:border-white" minlength="6" required>
                    </div>
                    <div>
                        <label class="block text-white text-sm font-medium mb-2">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/30 focus:outline-none focus:border-white" required>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">
                        Reset Password
                    </button>
                    <div id="step3Message" class="text-center text-sm text-red-200 hidden"></div>
                </form>
            </div>

            <!-- Success Message -->
            <div id="success" class="hidden text-center space-y-4">
                <div class="text-4xl">✅</div>
                <h2 class="text-xl font-bold text-white">Password Reset Successful!</h2>
                <p class="text-gray-300">Your password has been changed. You can now login with your new password.</p>
                <a href="login.html" class="block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200 text-center">
                    Go to Login
                </a>
            </div>
        </div>

        <!-- Back to Login -->
        <div class="text-center text-gray-200 mt-6">
            <a href="login.html" class="text-indigo-300 hover:text-indigo-100 text-sm font-semibold">← Back to Login</a>
        </div>
    </div>

    <script>
        let currentEmail = '';
        let currentOtp = '';

        // Step 1: Request OTP
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            currentEmail = email;

            try {
                const response = await fetch('/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();
                
                if (result.success) {
                    showMessage('OTP sent to your email', 'success', 'step1Message');
                    setTimeout(() => {
                        document.getElementById('step1').classList.add('hidden');
                        document.getElementById('step2').classList.remove('hidden');
                    }, 1500);
                } else {
                    showMessage(result.message, 'error', 'step1Message');
                }
            } catch (error) {
                showMessage('Failed to send OTP: ' + error.message, 'error', 'step1Message');
            }
        });

        // Step 2: Verify OTP
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otpInput').value;
            currentOtp = otp;

            try {
                const response = await fetch('/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });

                const result = await response.json();
                
                if (result.success) {
                    showMessage('OTP verified', 'success', 'step2Message');
                    setTimeout(() => {
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('step3').classList.remove('hidden');
                    }, 1500);
                } else {
                    showMessage(result.message, 'error', 'step2Message');
                }
            } catch (error) {
                showMessage('Verification failed: ' + error.message, 'error', 'step2Message');
            }
        });

        // Step 3: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error', 'step3Message');
                return;
            }

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp: currentOtp,
                        newPassword
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('step3').classList.add('hidden');
                    document.getElementById('success').classList.remove('hidden');
                } else {
                    showMessage(result.message, 'error', 'step3Message');
                }
            } catch (error) {
                showMessage('Password reset failed: ' + error.message, 'error', 'step3Message');
            }
        });

        function backToStep1() {
            currentEmail = '';
            currentOtp = '';
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('emailInput').value = '';
        }

        function showMessage(message, type, elementId) {
            const messageEl = document.getElementById(elementId);
            messageEl.textContent = message;
            messageEl.className = `text-center text-sm ${type === 'error' ? 'text-red-200' : 'text-green-200'}`;
            messageEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
