<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next-Wave Music</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Critical CSS Resets */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    /* Modern Dark Theme Background */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.25), transparent 55%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.25), transparent 45%),
        #050816;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 9999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.6);
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Ensure images and media don't overflow */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Ensure form elements scale properly */
    input, textarea, select {
      font-size: 16px;
      font-family: inherit;
      max-width: 100%;
    }

    /* Prevent input zoom on mobile */
    @media (max-width: 768px) {
      input, textarea, select {
        font-size: 16px !important;
      }
    }

    /* YouTube Music-style Horizontal List */
    .song-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.05);
      width: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }

    .song-row:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .song-row-cover {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.1);
    }

    .song-row-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .song-row-title {
      font-weight: 600;
      font-size: 14px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }

    .song-row-artist {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }

    .song-row-plays {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin: 0;
    }

    .song-row-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .song-row-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .song-row-btn:hover {
      background: rgba(99, 102, 241, 0.4);
      transform: scale(1.1);
    }

    .song-row-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: currentColor;
    }

    /* Download button animation */
    .download-btn {
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      transform: scale(1.1);
    }

    /* Smooth card hover animations */
    .song-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .song-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
    }

    /* Enhanced Responsive Design for Library and Sections */
    @media (max-width: 640px) {
      #songs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
      }

      .song-card {
        overflow: hidden;
      }

      .sidebar-item span {
        font-size: 14px;
      }

      h2 {
        font-size: 20px !important;
      }

      .flex.flex-col.xs\\:flex-row {
        flex-direction: column;
        width: 100%;
      }

      .flex.flex-col.xs\\:flex-row button {
        width: 100%;
      }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      #songs {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
    }

    @media (min-width: 1025px) {
      #songs {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
    }

    /* Sidebar active state */
    .sidebar-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.2));
      border-left: 3px solid rgba(99, 102, 241, 1);
    }

    /* Waveform animation for music bars */
    @keyframes waveform {
      0%, 100% { height: 4px; }
      50% { height: 16px; }
    }

    .waveform-bar {
      animation: waveform 0.6s ease-in-out infinite;
    }

    .waveform-bar:nth-child(1) { animation-delay: 0s; }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { animation-delay: 0.3s; }

    /* Mobile sidebar */
    .sidebar {
      transition: left 0.3s ease;
    }

    @media (max-width: 768px) {
      body {
        overflow: hidden;
      }

      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        width: 70%;
        height: 100vh;
        z-index: 40;
        transition: left 0.3s ease;
        overflow-y: auto;
      }

      .sidebar.active {
        left: 0;
      }

      /* Backdrop for mobile */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 30;
      }

      body.sidebar-open::before {
        opacity: 1;
        pointer-events: auto;
      }

      main {
        width: 100%;
      }
    }

    /* ===== PROFESSIONAL RESPONSIVE MEDIA QUERIES ===== */
    /* Mobile-First Approach - Aligned with Tailwind Breakpoints */

    /* Mobile: 320px - 639px */
    @media (max-width: 639px) {
      * {
        max-width: 100%;
      }

      header {
        flex-wrap: wrap;
        padding: 12px 12px !important;
        gap: 8px !important;
      }

      header h1 {
        font-size: 16px !important;
      }

      header p {
        font-size: 10px !important;
      }

      main {
        padding: 12px 12px !important;
        gap: 12px !important;
        max-height: calc(100vh - 140px) !important;
      }

      #songs {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
        margin-top: 16px !important;
      }

      h2 {
        font-size: 20px !important;
      }

      h3 {
        font-size: 16px !important;
      }

      section {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }

      aside {
        padding: 16px !important;
        border-radius: 20px !important;
      }

      #playerCover {
        height: 180px !important;
        width: 180px !important;
      }

      #player {
        width: 94vw !important;
        padding: 12px !important;
        bottom: 8px !important;
      }

      #mobileCover {
        height: 48px !important;
        width: 48px !important;
      }

      #mobileTitle {
        font-size: 12px !important;
      }

      #mobileArtist {
        font-size: 10px !important;
      }

      footer {
        padding: 24px 12px !important;
      }

      footer .grid {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }

      footer h4 {
        font-size: 14px !important;
      }

      footer p, footer a {
        font-size: 12px !important;
      }
    }

    /* Tablet Small: 640px - 767px (Tailwind's SM) */
    @media (min-width: 640px) and (max-width: 767px) {
      header {
        padding: 14px 16px !important;
      }

      header h1 {
        font-size: 18px !important;
      }

      main {
        padding: 16px 16px !important;
        gap: 16px !important;
      }

      #songs {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 14px !important;
      }

      h2 {
        font-size: 24px !important;
      }

      aside {
        padding: 18px !important;
      }

      #playerCover {
        height: 220px !important;
        width: 220px !important;
      }

      section {
        grid-template-columns: 1fr !important;
      }

      footer {
        padding: 32px 16px !important;
      }

      footer .grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    /* Tablet Medium: 768px - 1023px (Tailwind's MD) */
    @media (min-width: 768px) and (max-width: 1023px) {
      header {
        padding: 16px 20px !important;
      }

      header h1 {
        font-size: 20px !important;
      }

      main {
        padding: 20px 20px !important;
        gap: 20px !important;
      }

      #songs {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 16px !important;
      }

      h2 {
        font-size: 28px !important;
      }

      section {
        grid-template-columns: 1fr !important;
      }

      aside {
        padding: 20px !important;
        max-width: 100% !important;
      }

      #playerCover {
        height: 240px !important;
        width: 240px !important;
      }

      footer {
        padding: 40px 20px !important;
      }

      footer .grid {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }

    /* Desktop Small: 1024px - 1279px (Tailwind's LG) */
    @media (min-width: 1024px) and (max-width: 1279px) {
      header {
        padding: 18px 24px !important;
      }

      main {
        padding: 24px 24px !important;
        gap: 24px !important;
      }

      #songs {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 18px !important;
      }

      h2 {
        font-size: 32px !important;
      }

      section {
        grid-template-columns: 1.3fr 0.7fr !important;
      }

      aside {
        padding: 22px !important;
      }

      #playerCover {
        height: 280px !important;
        width: 280px !important;
      }

      footer {
        padding: 44px 24px !important;
      }

      footer .grid {
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 20px !important;
      }
    }

    /* Desktop Medium: 1280px - 1535px (Tailwind's XL) */
    @media (min-width: 1280px) and (max-width: 1535px) {
      header {
        padding: 20px 28px !important;
      }

      main {
        padding: 32px 28px !important;
        gap: 28px !important;
      }

      #songs {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)) !important;
        gap: 20px !important;
      }

      h2 {
        font-size: 36px !important;
      }

      section {
        grid-template-columns: 1.3fr 0.7fr !important;
      }

      aside {
        padding: 24px !important;
      }

      #playerCover {
        height: 300px !important;
        width: 300px !important;
      }

      footer {
        padding: 48px 28px !important;
      }

      footer .grid {
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 24px !important;
      }
    }

    /* Desktop Large: 1536px+ (Tailwind's 2XL) */
    @media (min-width: 1536px) {
      header {
        padding: 22px 32px !important;
      }

      main {
        padding: 40px 32px !important;
        gap: 32px !important;
      }

      #songs {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
        gap: 24px !important;
      }

      h2 {
        font-size: 40px !important;
      }

      section {
        grid-template-columns: 1.3fr 0.7fr !important;
      }

      aside {
        padding: 28px !important;
      }

      #playerCover {
        height: 320px !important;
        width: 320px !important;
      }

      footer {
        padding: 56px 32px !important;
      }

      footer .grid {
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 28px !important;
      }
    }

    /* Ultra-Wide Screens: 2560px+ */
    @media (min-width: 2560px) {
      main {
        max-width: 1600px !important;
      }

      #playerCover {
        height: 360px !important;
        width: 360px !important;
      }

      #songs {
        grid-template-columns: repeat(6, 1fr) !important;
      }
    }

    /* Landscape Orientation Adjustments */
    @media (orientation: landscape) and (max-height: 600px) {
      header {
        padding: 8px 12px !important;
      }

      header h1 {
        font-size: 14px !important;
      }

      main {
        padding: 8px 12px !important;
        gap: 8px !important;
      }

      #playerCover {
        height: 120px !important;
        width: 120px !important;
      }

      h2, h3 {
        font-size: 16px !important;
      }

      aside {
        padding: 10px !important;
      }

      footer {
        padding: 12px 12px !important;
      }
    }

    /* Accessibility & Special Features */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Ensure proper flex container sizing */
    .flex.h-screen.overflow-hidden {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Ensure main content area scrolls properly */
    main {
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: radial-gradient(circle at top, rgba(59, 130, 246, 0.25), transparent 55%),
          radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.25), transparent 45%),
          #050816;
      }
    }

    /* Print Styles */
    @media print {
      header, #player, footer {
        display: none !important;
      }

      main {
        padding: 0 !important;
      }
    }
  </style>
</head>

<body class="text-white antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside class="sidebar w-64 overflow-y-auto border-r border-white/10 bg-black/40 p-6 backdrop-blur max-md:w-72">
      <!-- Logo -->
      <div class="mb-8 flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-lg shadow-indigo-500/30">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-2v13" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19c0 1.105-.895 2-2 2s-2-.895-2-2 .895-2 2-2 2 .895 2 2z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 17c0 1.105-.895 2-2 2s-2-.895-2-2 .895-2 2-2 2 .895 2 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-lg font-semibold">Next-Wave</h1>
          <p class="text-xs text-white/60">Music</p>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="space-y-2">
        <a href="#" onclick="loadSongs(); return false" class="sidebar-item active flex items-center gap-3 rounded-lg px-4 py-3 text-white/80 transition hover:text-white hover:bg-white/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10.5 19.5H3.75A2.25 2.25 0 011.5 17.25V4.5a2.25 2.25 0 012.25-2.25h10.5A2.25 2.25 0 0116.5 4.5v7.5M13.5 1.5v7.5M7.5 5.25h3m-3 3h3m-3 3h3M22.5 19.5v-3m0 0l-2.5-2.5m2.5 2.5l2.5-2.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
          <span class="font-medium">Home</span>
        </a>

        <a href="#" onclick="loadTrending(); return false" class="sidebar-item flex items-center gap-3 rounded-lg px-4 py-3 text-white/60 transition hover:text-white hover:bg-white/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M13 2v7h7" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M9 13h6m-6 3h4" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span>Trending</span>
        </a>

        <a href="#" onclick="event.preventDefault()" class="sidebar-item flex items-center gap-3 rounded-lg px-4 py-3 text-white/60 transition hover:text-white hover:bg-white/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          </svg>
          <span>Library</span>
        </a>

        <a href="#" onclick="openContactModal(); return false" class="sidebar-item flex items-center gap-3 rounded-lg px-4 py-3 text-white/60 transition hover:text-white hover:bg-white/10">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V4l8 5 8-5v2z" fill="currentColor"/>
          </svg>
          <span>Promotions</span>
        </a>
      </nav>

      <!-- Search section in sidebar -->
      <div class="mt-6 sm:mt-8 border-t border-white/10 pt-6 sm:pt-8">
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/60">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1010.5 18.5a7.5 7.5 0 006.15-3.85z" />
            </svg>
          </span>
          <input id="search" class="w-full rounded-lg bg-white/10 py-2 pl-10 pr-4 text-xs sm:text-sm text-white outline-none ring-1 ring-white/10 transition focus:ring-2 focus:ring-indigo-400" placeholder="Search songs..." />
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto pb-24">
      <!-- Header with mobile menu toggle -->
      <header class="sticky top-0 z-10 border-b border-white/10 bg-black/40 px-6 py-5 backdrop-blur">
        <div class="flex items-center justify-between">
          <button id="menuToggle" class="md:hidden rounded-lg bg-white/10 p-2 text-white hover:bg-white/15 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
          </button>
          <h1 class="text-2xl font-bold">Your Library</h1>
          <div class="flex items-center gap-4">
            <span id="userProfile" class="text-sm text-gray-300 hidden"></span>
            <button id="authButton" class="rounded-lg bg-indigo-600 hover:bg-indigo-700 px-4 py-2 text-sm font-medium text-white transition">
              Login
            </button>
          </div>
        </div>
      </header>

      <!-- Content section -->
      <div class="px-4 sm:px-6 py-6 sm:py-8">
        <!-- Song count -->
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div>
            <h2 class="text-2xl sm:text-3xl font-bold">All Songs</h2>
            <p class="mt-1 text-xs sm:text-sm text-white/60"><span id="songCount">0</span> songs available</p>
          </div>
          <div class="flex flex-col xs:flex-row gap-2 sm:gap-3">
            <button onclick="loadSongs()" class="rounded-full bg-white/10 px-4 sm:px-6 py-2 text-xs sm:text-sm font-medium text-white transition hover:bg-white/15 whitespace-nowrap">
              Reset
            </button>
            <button onclick="loadTrending()" class="rounded-full bg-indigo-500/20 px-4 sm:px-6 py-2 text-xs sm:text-sm font-medium text-indigo-200 transition hover:bg-indigo-500/30 whitespace-nowrap">
              Trending
            </button>
          </div>
        </div>

        <!-- Songs List - Horizontal Rows -->
        <div id="songs" class="space-y-2"></div>
      </div>
    </main>
  </div>

  <!-- Bottom Music Player Bar -->
  <div id="playerBar" class="fixed bottom-0 left-0 right-0 z-50 border-t border-white/10 bg-black/80 px-6 py-3 backdrop-blur">
    <div class="mx-auto max-w-full">
      <!-- Progress bar -->
      <div class="mb-4 h-1 w-full overflow-hidden rounded-full bg-white/10">
        <div id="playerBarProgress" class="h-full w-0 bg-gradient-to-r from-emerald-400 via-cyan-400 to-indigo-400"></div>
      </div>

      <!-- Player content -->
      <div class="flex items-center justify-between gap-4">
        <!-- Album art and info -->
        <div class="flex flex-1 items-center gap-4 min-w-0">
          <img id="playerBarCover" class="h-14 w-14 flex-none rounded-lg bg-white/10 object-cover" src="" alt="Cover" />
          <div class="min-w-0">
            <p id="playerBarTitle" class="truncate text-sm font-semibold">No song playing</p>
            <p id="playerBarArtist" class="truncate text-xs text-white/60">Select a track</p>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-none items-center gap-4">
          <div class="hidden sm:flex items-center gap-2 text-xs text-white/60">
            <span id="playerBarTime">0:00</span>
            <span>/</span>
            <span id="playerBarDuration">0:00</span>
          </div>
          <button id="playerBarPlayBtn" class="flex h-10 w-10 items-center justify-center rounded-full bg-indigo-500 text-white hover:bg-indigo-600 transition">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Contact Modal -->
  <div id="contactModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="relative max-h-[90vh] w-full max-w-md overflow-y-auto rounded-2xl bg-gradient-to-b from-white/10 to-white/5 p-6 shadow-2xl ring-1 ring-white/20">
      <!-- Close button -->
      <button id="contactClose" class="absolute right-4 top-4 rounded-full bg-white/10 p-2 text-white hover:bg-white/20">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <h2 class="mb-6 text-2xl font-bold text-white">Contact Us for Promotions & Ads</h2>
      
      <!-- Contact Options -->
      <div id="contactOptions" class="space-y-4 mb-4">
        <button onclick="openContactForm()" class="w-full rounded-lg bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-6 py-3 font-semibold text-white transition hover:shadow-lg hover:shadow-indigo-500/30">
          <svg class="inline-block h-5 w-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V4l8 5 8-5v2z"/>
          </svg>
          Send Direct Message
        </button>
        
        <button onclick="openWhatsAppOptions()" class="w-full rounded-lg bg-gradient-to-r from-green-500 to-emerald-600 px-6 py-3 font-semibold text-white transition hover:shadow-lg hover:shadow-green-500/30">
          <svg class="inline-block h-5 w-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004a9.87 9.87 0 00-5.031 1.378c-3.055 2.281-4.863 5.915-4.863 9.613 0 1.77.292 3.518.85 5.19l-1.434 5.237 5.53-1.437c1.52.811 3.231 1.24 4.947 1.24 5.517 0 10.105-4.587 10.105-10.102 0-2.683-.811-5.214-2.359-7.431a9.746 9.746 0 00-7.151-3.188z"/>
          </svg>
          Send via WhatsApp
        </button>
      </div>

      <!-- Direct Message Form (Hidden by default) -->
      <div id="contactForm" class="hidden space-y-4">
        <h3 class="text-lg font-semibold text-white mb-4">Send Us a Message</h3>
        
        <div>
          <label class="block text-sm font-medium text-white mb-2">Your Name</label>
          <input type="text" id="contactName" placeholder="Enter your name" class="w-full rounded-lg bg-white/10 px-4 py-2 text-white placeholder-white/50 outline-none ring-1 ring-white/10 transition focus:ring-2 focus:ring-indigo-400"/>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white mb-2">Your Email</label>
          <input type="email" id="contactEmail" placeholder="Enter your email" class="w-full rounded-lg bg-white/10 px-4 py-2 text-white placeholder-white/50 outline-none ring-1 ring-white/10 transition focus:ring-2 focus:ring-indigo-400"/>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white mb-2">Subject</label>
          <select id="contactSubject" class="w-full rounded-lg bg-white/10 px-4 py-2 text-white outline-none ring-1 ring-white/10 transition focus:ring-2 focus:ring-indigo-400">
            <option value="promote_song">I want to promote my song</option>
            <option value="advertise_service">I want to advertise my service</option>
            <option value="advertise_products">I want to advertise my products</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-white mb-2">Message</label>
          <textarea id="contactMessage" placeholder="Tell us more about your promotion or advertisement..." class="w-full rounded-lg bg-white/10 px-4 py-2 text-white placeholder-white/50 outline-none ring-1 ring-white/10 transition focus:ring-2 focus:ring-indigo-400" rows="4"></textarea>
        </div>
        
        <button onclick="submitContactForm()" class="w-full rounded-lg bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-6 py-3 font-semibold text-white transition hover:shadow-lg hover:shadow-indigo-500/30">
          Send Message
        </button>
        
        <button onclick="backToContactOptions()" class="w-full rounded-lg bg-white/10 px-6 py-3 font-semibold text-white transition hover:bg-white/20">
          Back
        </button>
      </div>

      <!-- WhatsApp Options (Hidden by default) -->
      <div id="whatsappOptions" class="hidden space-y-3">
        <h3 class="text-lg font-semibold text-white mb-4">Choose What You Want to Do</h3>
        <button onclick="sendWhatsAppMessage('promote_song')" class="w-full rounded-lg bg-green-500/10 border border-green-500/30 px-4 py-2 text-left text-white hover:bg-green-500/20 transition">
          <svg class="inline-block h-4 w-4 mr-2" fill="currentColor" viewBox="0 0 24 24"/>
          🎵 I want to promote my song on this website
        </button>
        <button onclick="sendWhatsAppMessage('advertise_service')" class="w-full rounded-lg bg-green-500/10 border border-green-500/30 px-4 py-2 text-left text-white hover:bg-green-500/20 transition">
          <svg class="inline-block h-4 w-4 mr-2" fill="currentColor" viewBox="0 0 24 24"/>
          💼 I want to advertise my service
        </button>
        <button onclick="sendWhatsAppMessage('advertise_products')" class="w-full rounded-lg bg-green-500/10 border border-green-500/30 px-4 py-2 text-left text-white hover:bg-green-500/20 transition">
          <svg class="inline-block h-4 w-4 mr-2" fill="currentColor" viewBox="0 0 24 24"/>
          📦 I want to advertise my products
        </button>
        <button onclick="backToContactOptions()" class="w-full rounded-lg bg-white/10 px-6 py-3 font-semibold text-white transition hover:bg-white/20">
          Back
        </button>
      </div>
    </div>
  </div>

  <!-- Advert Modal -->
  <div id="advertModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="relative max-h-[90vh] w-full max-w-md overflow-y-auto rounded-2xl bg-gradient-to-b from-white/10 to-white/5 p-6 shadow-2xl ring-1 ring-white/20">
      <!-- Close button -->
      <button id="advertClose" class="absolute right-4 top-4 rounded-full bg-white/10 p-2 text-white hover:bg-white/20">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Advert content -->
      <img id="advertImage" class="mb-4 h-48 w-full rounded-xl object-cover" src="" alt="Advertisement" />
      <h3 id="advertTitle" class="mb-2 text-xl font-bold text-white"></h3>
      <p id="advertDescription" class="mb-6 text-sm text-white/80"></p>

      <!-- Action button -->
      <a id="advertLink" href="#" target="_blank" rel="noopener noreferrer" class="block w-full rounded-lg bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-6 py-3 text-center font-semibold text-white transition hover:shadow-lg hover:shadow-indigo-500/30">
        Visit Link
      </a>
    </div>
  </div>

  <!-- Audio element -->
  <audio id="audio" crossorigin="anonymous" preload="metadata"></audio>

  <script src="app.js"></script>
  <script>
    // Mobile menu toggle functionality
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.querySelector('.sidebar');
    
    if (menuToggle) {
      menuToggle.addEventListener('click', function(e) {
        e.preventDefault();
        sidebar.classList.toggle('active');
        document.body.classList.toggle('sidebar-open');
      });
    }

    // Close sidebar when clicking on backdrop or links
    document.addEventListener('click', function(e) {
      // Close sidebar when clicking outside of it on mobile
      if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
          sidebar.classList.remove('active');
          document.body.classList.remove('sidebar-open');
        }
      }
    });

    // Close sidebar when clicking on navigation links
    document.querySelectorAll('.sidebar-item').forEach(item => {
      item.addEventListener('click', function() {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('active');
          document.body.classList.remove('sidebar-open');
        }
      });
    });

    // Handle window resize - close sidebar on larger screens
    window.addEventListener('resize', function() {
      if (window.innerWidth > 768) {
        sidebar.classList.remove('active');
        document.body.classList.remove('sidebar-open');
      }
    });
  </script>
</body>
