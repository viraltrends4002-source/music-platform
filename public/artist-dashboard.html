<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Dashboard - Music Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #fff;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="card backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl font-bold">🎵 Artist Dashboard</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm text-gray-400"></span>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm font-semibold">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Upload Section -->
        <div class="card rounded-lg p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6">Upload New Song</h2>
            
            <form id="uploadForm" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Song Title *</label>
                        <input type="text" id="title" placeholder="Enter song title" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Artist Name *</label>
                        <input type="text" id="artist" placeholder="Your name" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:border-indigo-500" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Description</label>
                    <textarea id="description" placeholder="Describe your song..." rows="3" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:border-indigo-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Lyrics</label>
                    <textarea id="lyrics" placeholder="Song lyrics..." rows="4" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:border-indigo-500"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Audio File (MP3, M4A, WAV, OGG) *</label>
                        <div class="border-2 border-dashed border-white/30 rounded-lg p-6 text-center cursor-pointer hover:border-indigo-500 transition" id="audioDropZone">
                            <input type="file" id="audioFile" accept="audio/*" hidden required>
                            <div>
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12 6-12 6v-6m-6 0v-2a2 2 0 012-2h2m0 0h2a2 2 0 012 2v2H7v-2a2 2 0 012-2h2m0 0h2a2 2 0 012 2v2m0 0v2a2 2 0 01-2 2h-2m0 0h-2a2 2 0 01-2-2v-2m6 0a2 2 0 11-4 0 2 2 0 014 0z"/>
                                </svg>
                                <p id="audioFileName" class="text-sm text-gray-400">Click or drag audio file</p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Cover Image (Optional)</label>
                        <div class="border-2 border-dashed border-white/30 rounded-lg p-6 text-center cursor-pointer hover:border-indigo-500 transition" id="coverDropZone">
                            <input type="file" id="coverFile" accept="image/*" hidden>
                            <div>
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <p id="coverFileName" class="text-sm text-gray-400">Click or drag cover image</p>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">
                    🎵 Upload Song
                </button>

                <div id="uploadMessage" class="text-center text-sm hidden"></div>
            </form>
        </div>

        <!-- Your Songs Section -->
        <div>
            <h2 class="text-2xl font-bold mb-6">Your Songs</h2>
            <div id="songsList" class="grid md:grid-cols-3 gap-6">
                <!-- Songs will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (!token || user.accountType !== 'artist') {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userName').textContent = `Welcome, ${user.username}!`;
        }

        // File drag and drop
        const audioDropZone = document.getElementById('audioDropZone');
        const audioFile = document.getElementById('audioFile');
        const audioFileName = document.getElementById('audioFileName');

        const coverDropZone = document.getElementById('coverDropZone');
        const coverFile = document.getElementById('coverFile');
        const coverFileName = document.getElementById('coverFileName');

        audioDropZone.addEventListener('click', () => audioFile.click());
        audioDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            audioDropZone.classList.add('border-indigo-500', 'bg-indigo-500/10');
        });
        audioDropZone.addEventListener('dragleave', () => {
            audioDropZone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
        });
        audioDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            audioDropZone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                audioFile.files = files;
                audioFileName.textContent = files[0].name;
            }
        });

        audioFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                audioFileName.textContent = e.target.files[0].name;
            }
        });

        coverDropZone.addEventListener('click', () => coverFile.click());
        coverDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            coverDropZone.classList.add('border-indigo-500', 'bg-indigo-500/10');
        });
        coverDropZone.addEventListener('dragleave', () => {
            coverDropZone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
        });
        coverDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            coverDropZone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                coverFile.files = files;
                coverFileName.textContent = files[0].name;
            }
        });

        coverFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                coverFileName.textContent = e.target.files[0].name;
            }
        });

        // Upload form
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('artist', document.getElementById('artist').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('lyrics', document.getElementById('lyrics').value);
            
            if (audioFile.files.length === 0) {
                showUploadMessage('Audio file is required', 'error');
                return;
            }
            
            formData.append('audio', audioFile.files[0]);
            
            if (coverFile.files.length > 0) {
                formData.append('cover', coverFile.files[0]);
            }

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.success) {
                    showUploadMessage('Song uploaded successfully!', 'success');
                    document.getElementById('uploadForm').reset();
                    audioFileName.textContent = 'Click or drag audio file';
                    coverFileName.textContent = 'Click or drag cover image';
                    loadUserSongs();
                } else {
                    showUploadMessage(result.message, 'error');
                }
            } catch (error) {
                showUploadMessage('Upload failed: ' + error.message, 'error');
            }
        });

        function showUploadMessage(message, type) {
            const messageEl = document.getElementById('uploadMessage');
            messageEl.textContent = message;
            messageEl.className = `text-center text-sm ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
            messageEl.classList.remove('hidden');
        }

        // Load user songs
        async function loadUserSongs() {
            try {
                const response = await fetch('/songs');
                const songs = await response.json();
                
                const songsList = document.getElementById('songsList');
                songsList.innerHTML = '';
                
                if (songs.length === 0) {
                    songsList.innerHTML = '<p class="text-gray-400 col-span-3 text-center py-8">No songs uploaded yet</p>';
                    return;
                }
                
                songs.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'card rounded-lg overflow-hidden hover:border-indigo-500/50 transition';
                    div.innerHTML = `
                        <img src="${song.cover || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23333%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2230%22%3E🎵%3C/text%3E%3C/svg%3E'}" alt="${song.title}" class="w-full h-40 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-1">${song.title}</h3>
                            <p class="text-sm text-gray-400 mb-3">${song.artist}</p>
                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <span>▶️ ${song.plays || 0} plays</span>
                                <button onclick="deleteSong(${song.id})" class="text-red-400 hover:text-red-300">Delete</button>
                            </div>
                        </div>
                    `;
                    songsList.appendChild(div);
                });
            } catch (error) {
                console.error('Failed to load songs:', error);
            }
        }

        // Delete song
        async function deleteSong(id) {
            if (!confirm('Are you sure you want to delete this song?')) return;

            try {
                const response = await fetch(`/delete/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                if (result.message.includes('successfully')) {
                    loadUserSongs();
                } else {
                    alert('Failed to delete song');
                }
            } catch (error) {
                alert('Error deleting song: ' + error.message);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Initialize
        checkAuth();
        loadUserSongs();
    </script>
</body>
</html>
